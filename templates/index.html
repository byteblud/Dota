<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BloomTrack</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-[#020617] text-white min-h-screen">

    <div class="max-w-6xl mx-auto p-8">

        <!-- Header -->

        <div class="flex items-center justify-between mb-10">

            <div>

                <h1 class="text-6xl font-bold gradient-text">
                    BloomTrack 🌱
                </h1>

                <p class="text-gray-400 mt-3 text-lg">
                    Calm productivity and deep focus.
                </p>

            </div>

            <div class="flex gap-4">

                <a href="/dashboard"
                   class="bg-purple-600 px-6 py-3 rounded-2xl">
                    Dashboard
                </a>

                <a href="/focus"
                   class="bg-blue-500 px-6 py-3 rounded-2xl">
                    Focus
                </a>

            </div>

        </div>

        <!-- Add Task Form -->

        <div class="glass-card p-8 rounded-3xl mb-10">

            <form action="/add_task"
                  method="POST"
                  class="grid md:grid-cols-3 gap-5">

                <input
                    type="text"
                    name="title"
                    placeholder="Enter your task"
                    class="bg-[#111827] p-4 rounded-2xl outline-none"
                    required
                >

                <input
                    type="number"
                    name="estimated"
                    placeholder="Estimated Minutes"
                    class="bg-[#111827] p-4 rounded-2xl outline-none"
                    required
                >

                <button
                    class="bg-green-500 rounded-2xl text-lg font-semibold">

                    Add Seed 🌱

                </button>

            </form>

        </div>

        <!-- Tasks -->

        <div class="grid gap-5">

            {% for task in tasks %}

            <div class="glass-card p-6 rounded-3xl flex justify-between items-center">

                <div>

                    <h2 class="text-2xl font-semibold">
                        {{ task.title }}
                    </h2>

                    <p class="text-gray-400 mt-2">
                        {{ task.estimated_minutes }} Minutes
                    </p>

                </div>

                {% if task.completed %}

                    <div class="text-green-400 text-4xl">
                        ✓
                    </div>

                {% else %}

                    <a href="/complete/{{ task.id }}"
                       class="bg-blue-500 px-5 py-3 rounded-2xl">

                        Complete

                    </a>

                {% endif %}

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
