<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen">

<div class="max-w-6xl mx-auto p-8">

    <div class="mb-10">
        <h1 class="text-5xl font-bold">Weekly Progress</h1>
        <p class="text-gray-400 mt-2">Track your roadmap journey.</p>
    </div>


    <div class="grid md:grid-cols-3 gap-6 mb-10">

        <div class="bg-[#111827] p-8 rounded-3xl">
            <h2 class="text-gray-400">Total Tasks</h2>
            <p class="text-5xl font-bold mt-4">{{ total }}</p>
        </div>

        <div class="bg-[#111827] p-8 rounded-3xl">
            <h2 class="text-gray-400">Completed</h2>
            <p class="text-5xl font-bold mt-4">{{ completed }}</p>
        </div>

        <div class="bg-[#111827] p-8 rounded-3xl">
            <h2 class="text-gray-400">Progress</h2>
            <p class="text-5xl font-bold mt-4">{{ progress }}%</p>
        </div>

    </div>


    <div class="bg-[#111827] rounded-3xl p-10">
        <canvas id="progressChart"></canvas>
    </div>

</div>

<script>
const ctx = document.getElementById('progressChart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Completed', 'Remaining'],
        datasets: [{
            data: [{{ completed }}, {{ total - completed }}],
            borderWidth: 0
        }]
    }
});
</script>

</body>
</html>
